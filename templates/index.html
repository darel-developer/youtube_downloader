<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>YouTube Downloader</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Animations -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>

body{
background: linear-gradient(135deg,#ff0000,#ff6a00);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial, Helvetica, sans-serif;
}

.card{
border:none;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

.title{
font-weight:bold;
color:#ff0000;
}

.btn-download{
background:#ff0000;
border:none;
transition:0.3s;
}

.btn-download:hover{
background:#cc0000;
transform:scale(1.05);
}

input{
border-radius:10px !important;
}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card p-4 animate__animated animate__fadeInDown">

<h3 class="text-center title mb-4">
🎬 YouTube Video Downloader
</h3>

<form method="POST">

<div class="mb-3">

<input
type="text"
class="form-control form-control-lg"
name="url"
placeholder="Collez le lien de la vidéo YouTube"
required>

</div>

<div class="d-grid">

<button class="btn btn-download btn-lg text-white animate__animated animate__pulse animate__infinite">
⬇ Télécharger la vidéo
</button>

</div>

</form>

</div>

</div>

</div>

</div>

</body>

</html>
