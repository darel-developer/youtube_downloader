<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>YouTube Downloader</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    background: linear-gradient(135deg,#ff0000,#ff6a00);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:Arial, Helvetica, sans-serif;
}
.card {
    border:none;
    border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
}
.title {
    font-weight:bold;
    color:#ff0000;
}
.btn-download {
    background:#ff0000;
    border:none;
    transition:0.3s;
}
.btn-download:hover {
    background:#cc0000;
    transform:scale(1.05);
}
input, select {
    border-radius:10px !important;
}
.summary-div {
    margin-top: 20px;
    padding: 15px;
    background-color: #fff3cd;
    border: 1px solid #ffeeba;
    border-radius: 10px;
    color: #856404;
}
</style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h3 class="text-center title mb-4">🎬 YouTube Video Downloader</h3>
                <form method="POST">
                    <div class="mb-3">
                        <input type="text" class="form-control form-control-lg" name="url" placeholder="Collez le lien de la vidéo YouTube" required>
                    </div>
                    <div class="mb-3">
                        <select name="format" class="form-select form-select-lg">
                            <option value="mp4">Télécharger en MP4 (vidéo)</option>
                            <option value="mp3">Télécharger en MP3 (audio)</option>
                        </select>
                    </div>
                    <div class="d-grid mb-2">
                        <button class="btn btn-download btn-lg text-white" type="submit">⬇ Télécharger la vidéo</button>
                    </div>
                    <div class="d-grid">
                        <button class="btn btn-primary btn-lg text-white" name="action" value="summarize">Résumé de la vidéo</button>
                    </div>
                </form>

                <!-- Div pour afficher le résumé -->
                {% if summary %}
                <div class="summary-div">
                    <h5>Résumé de la vidéo :</h5>
                    <p>{{ summary }}</p>
                </div>
                {% endif %}

            </div>
        </div>
    </div>
</div>

</body>
</html>
